entity_clone.settings:
  type: config_object
  label: 'Module entity_clone settings'
  mapping:
    form_settings:
      type: sequence
      sequence:
        type: entity_clone.entity_type.settings
    no_suffix:
      type: boolean
    take_ownership:
      type: boolean
    handle_bundles:
      type: boolean

entity_clone.entity_type.settings:
  type: mapping
  mapping:
    default_value:
      type: boolean
    disable:
      type: boolean
    hidden:
      type: boolean

entity_clone.cloneable_entities:
  type: config_object
  label: 'Cloneable entities setting'
  mapping:
    cloneable_entities:
      type: sequence
      label: 'Cloneable entities'
      sequence:
        type: string
        label: 'Entity type'
