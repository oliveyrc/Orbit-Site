media_thumbnails_video.settings:
  type: config_object
  label: 'Media Thumbnails Video settings'
  mapping:
    ffmpeg:
      type: string
      label: 'The path to ffmpeg'
      nullable: true
    ffprobe:
      type: string
      label: 'The path to ffprobe'
      nullable: true
    timeout:
      type: string
      label: 'Timeout for thumbnail generation'
      nullable: true
    threads:
      type: string
      label: 'Number of threads to use for thumbnail generation'
      nullable: true
