id: test_index
server: test_server
field_settings:
  aggregated_field:
    label: 'Aggregated field'
    property_path: aggregated_field
    type: string
    configuration:
      type: union
      fields:
        - search_api_test/foo
        - 'entity:entity_test/name'
        - 'entity:entity_test_mul/name'
        - 'entity:entity_test_string_id/name'
  name:
    label: Name
    type: text
    datasource_id: 'entity:entity_test'
    property_path: name
  language_with_fallback:
    label: 'Language (with fallback)'
    property_path: language_with_fallback
    type: string
options:
  index_directly: true
datasource_settings:
  search_api_test: {  }
  'entity:entity_test': {  }
  'entity:entity_test_mul': {  }
  'entity:entity_test_string_id': {  }
processor_settings: {  }
tracker_settings:
  default: {  }
dependencies:
  config:
    - search_api.server.test_server
