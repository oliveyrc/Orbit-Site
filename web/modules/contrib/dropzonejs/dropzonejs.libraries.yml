dropzonejs:
  title: 'Dropzonejs'
  website: https://doc.dropzone.deltablot.app/
  version: 7.4.3
  license:
    name: MIT
    url: https://github.com/NicolasCARPi/dropzone/blob/master/LICENSE
    gpl-compatible: true
  js:
    /libraries/dropzone/dist/dropzone-min.js: { minified: true }
  css:
    component:
      /libraries/dropzone/dist/dropzone.css: { minified: true }
widget:
  version: VERSION
  css:
    theme:
      css/dropzone.widget.css: {}
integration:
  version: VERSION
  js:
    js/dropzone.integration.js: {}
  dependencies:
    - core/once
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - dropzonejs/dropzonejs

media_library:
  version: VERSION
  js:
    js/dropzone.media_library.js: {}
  dependencies:
    - dropzonejs/integration
